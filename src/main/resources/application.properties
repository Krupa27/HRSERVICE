spring.application.name=hrservice
# Allow Render to set the port, default to 8081
server.port=${PORT:8081}

spring.cloud.compatibility-verifier.enabled=false

# PostgreSQL Database (Neon) - Using your provided credentials
spring.datasource.url=jdbc:postgresql://ep-patient-sky-a49ilhak-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_LbDg8KM6icGj
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- EUREKA CONNECTION FIXES ---
# 1. Point to your ACTUAL live registry
eureka.client.service-url.defaultZone=https://serviceregistry-1-p6w0.onrender.com/eureka/

# 2. Render Networking (Must use hostname, not IP, for public routing)
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME}
eureka.instance.prefer-ip-address=false

# 3. Force Secure Communication for Render
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=443

# Logging for Feign (Useful for debugging HR -> JWT calls)
logging.level.org.springframework.cloud.openfeign=DEBUG